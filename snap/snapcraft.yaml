name: open-netflix-client
base: core24
version: "1.0.6"
title: Unofficial Netflix Client
summary: Unofficial Netflix desktop client for Linux
contact: mrzazon1@gmail.com
license: MIT
issues: https://github.com/mrZazon/netflix-client/issues
source-code: https://github.com/mrZazon/netflix-client
icon: app/assets/icon.png
description: |
  An unofficial, native-feeling Linux desktop client for Netflix built with
  Python and Qt (PySide6). Provides deep desktop integration including system
  tray, MPRIS media controls, global keyboard shortcuts, and Picture-in-Picture
  mode.

  This application is a web wrapper around netflix.com and is NOT affiliated
  with, endorsed by, or sponsored by Netflix, Inc. Netflix is a registered
  trademark of Netflix, Inc.

grade: stable
confinement: strict
compression: lzo

platforms:
  amd64:

apps:
  netflix-client:
    command: bin/netflix-client-launcher
    desktop: share/applications/netflix-client.desktop
    plugs:
      - network
      - network-bind
      - home
      - wayland
      - x11
      - opengl
      - audio-playback
      - desktop
      - desktop-legacy
      - unity7
      - keyring
      - browser-support
      - hardware-observe
    environment:
      PYTHONPATH: $SNAP/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      QT_QPA_PLATFORMTHEME: qt6ct

plugs:
  keyring:
    interface: password-manager-service

parts:
  launcher:
    plugin: nil
    source: snap/local
    override-build: |
      install -Dm755 netflix-client-launcher $SNAPCRAFT_PART_INSTALL/bin/netflix-client-launcher

  desktop-files:
    plugin: nil
    source: .
    override-build: |
      install -Dm644 packaging/netflix-client.desktop \
        $SNAPCRAFT_PART_INSTALL/share/applications/netflix-client.desktop
      # Icon is resolved by name through hicolor theme
      install -Dm644 app/assets/icon.png \
        $SNAPCRAFT_PART_INSTALL/share/icons/hicolor/256x256/apps/netflix-client.png

  netflix-client:
    plugin: python
    source: .
    build-packages: []
    stage-packages:
      - xz-utils
      - dpkg
      - libnss3
      - libnspr4
      - libasound2t64
      - libpulse0
      - libcups2t64
      - libdrm2
      - libgbm1
      - libxdamage1
      - libxcb-dri3-0
      - libxcb-present0
      - libxshmfence1
      - libxkbcommon0
      - libfontconfig1
      - libdbus-1-3
      - libegl1
      - libgl1
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-xkb1
      - libxkbcommon-x11-0
      - libxcomposite1
      - libxfixes3
      - libxrandr2
      - libxrender1
      - libxtst6
      - libxi6
      - libxext6
      - libx11-6
      - libxxf86vm1
      - libxcb-xfixes0
      - libxcb-randr0
      - libxcb-shm0
      - libxcb-xinput0
      - libxkbfile1
      - libudev1
    python-packages:
      - PySide6>=6.6
      - keyring>=24.0
      - platformdirs>=4.0
    after:
      - launcher
      - desktop-files
