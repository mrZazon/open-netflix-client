name: open-netflix-client
base: core24
version: "1.0.2"
title: Unofficial Netflix Client
summary: Unofficial Netflix desktop client for Linux
contact: mrzazon1@gmail.com
license: MIT
issues: https://github.com/mrZazon/netflix-client/issues
source-code: https://github.com/mrZazon/netflix-client
icon: app/assets/icon.svg
description: |
  An unofficial, native-feeling Linux desktop client for Netflix built with
  Python and Qt (PySide6). Provides deep desktop integration including system
  tray, MPRIS media controls, global keyboard shortcuts, and Picture-in-Picture
  mode.

  This application is a web wrapper around netflix.com and is NOT affiliated
  with, endorsed by, or sponsored by Netflix, Inc. Netflix is a registered
  trademark of Netflix, Inc.

grade: stable
confinement: strict
compression: lzo

platforms:
  amd64:

apps:
  netflix-client:
    command: bin/netflix-client-launcher
    desktop: share/applications/netflix-client.desktop
    plugs:
      - network
      - network-bind
      - home
      - wayland
      - x11
      - opengl
      - audio-playback
      - desktop
      - desktop-legacy
      - unity7
      - keyring
    environment:
      PYTHONPATH: $SNAP/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages
      QTWEBENGINE_CHROMIUM_FLAGS: --disable-software-rasterizer
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      QT_QPA_PLATFORMTHEME: qt6ct

plugs:
  keyring:
    interface: password-manager-service

parts:
  launcher:
    plugin: nil
    source: snap/local
    override-build: |
      install -Dm755 netflix-client-launcher $SNAPCRAFT_PART_INSTALL/bin/netflix-client-launcher

  desktop-files:
    plugin: nil
    source: .
    override-build: |
      install -Dm644 packaging/netflix-client.desktop \
        $SNAPCRAFT_PART_INSTALL/share/applications/netflix-client.desktop
      sed -i "s|Icon=netflix-client|Icon=\${SNAP}/share/icons/hicolor/scalable/apps/netflix-client.svg|" \
        $SNAPCRAFT_PART_INSTALL/share/applications/netflix-client.desktop
      install -Dm644 app/assets/icon.svg \
        $SNAPCRAFT_PART_INSTALL/share/icons/hicolor/scalable/apps/netflix-client.svg

  netflix-client:
    plugin: python
    source: .
    build-packages: []
    stage-packages:
      - libnss3
      - libnspr4
      - libasound2t64
      - libpulse0
      - libcups2t64
      - libdrm2
      - libgbm1
      - libxdamage1
      - libxcb-dri3-0
      - libxcb-present0
      - libxshmfence1
      - libxkbcommon0
      - libfontconfig1
      - libdbus-1-3
      - libegl1
    python-packages:
      - PySide6>=6.6
      - keyring>=24.0
      - platformdirs>=4.0
    after:
      - launcher
      - desktop-files
